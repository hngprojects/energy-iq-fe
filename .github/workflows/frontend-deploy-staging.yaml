name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            sudo -u appuser bash -c '
              cd /home/appuser/frontend/staging/energy-iq-fe

              git pull origin staging

              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

              pnpm install --frozen-lockfile
              pnpm migration:run
              pnpm build

              pm2 reload fe-dev --update-env || pm2 start dist/main.js --name fe-dev
              pm2 save
            '

      - name: Health check
        run: |
          sleep 15
          curl --fail --max-time 30 https://staging.energy-iq.hng14.com/ || exit 1
