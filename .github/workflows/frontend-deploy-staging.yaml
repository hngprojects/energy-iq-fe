name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
              cd /home/appuser/frontend/staging/energy-iq-fe

              git pull origin staging

              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

              pnpm install --frozen-lockfile
              pnpm build

              pm2 reload fe-dev --update-env || pm2 start pnpm --name fe-dev -- start -H 0.0.0.0 -p 3005
              pm2 save

      - name: Health check
        run: |
          sleep 15
          curl --fail --max-time 30 https://staging.energy-iq.hng14.com || exit 1
