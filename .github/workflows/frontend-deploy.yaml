name: Frontend Deploy

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - main

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          TARGET="${{ github.event.inputs.environment || github.ref_name }}"

          if [[ "$TARGET" == "main" ]]; then
            echo "SERVER_APP_DIR=${{ secrets.PRODUCTION_APP_DIR }}" >> $GITHUB_ENV
            echo "SYSTEMD_SERVICE_NAME=${{ secrets.PRODUCTION_SERVICE_NAME }}" >> $GITHUB_ENV
            echo "SERVER_ENV_FILE_PATH=${{ secrets.PRODUCTION_ENV_FILE_PATH }}" >> $GITHUB_ENV
            echo "HEALTHCHECK_URL=${{ secrets.HEALTHCHECK_URL }}" >> $GITHUB_ENV
            echo "ENV_CONTEXT=production" >> $GITHUB_ENV

          elif [[ "$TARGET" == "staging" ]]; then
            echo "SERVER_APP_DIR=${{ secrets.STAGING_APP_DIR }}" >> $GITHUB_ENV
            echo "SYSTEMD_SERVICE_NAME=${{ secrets.STAGING_SERVICE_NAME }}" >> $GITHUB_ENV
            echo "SERVER_ENV_FILE_PATH=${{ secrets.STAGING_ENV_FILE_PATH }}" >> $GITHUB_ENV
            echo "HEALTHCHECK_URL=${{ secrets.HEALTHCHECK_URL }}" >> $GITHUB_ENV
            echo "ENV_CONTEXT=staging" >> $GITHUB_ENV

          else
            echo "Invalid target: '$TARGET'. Must be 'staging' or 'main'."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify build
        run: pnpm build

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.github' \
            -czf /tmp/energy-iq-fe.tar.gz .

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add SSH known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload archive
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -P "$SSH_PORT" /tmp/energy-iq-fe.tar.gz \
            "$SSH_USER@$SSH_HOST:/tmp/energy-iq-fe.tar.gz"

      - name: Write environment file on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_ENV_FILE: ${{ env.ENV_CONTEXT == 'production' && secrets.PRODUCTION_APP_ENV_FILE || secrets.STAGING_APP_ENV_FILE }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "mkdir -p \"$(dirname \"${SERVER_ENV_FILE_PATH}\")\""
          printf '%s' "${APP_ENV_FILE}" | \
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "umask 077 && cat > \"${SERVER_ENV_FILE_PATH}\""

      - name: Run remote deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_DIR='${SERVER_APP_DIR}' \
             SERVICE_NAME='${SYSTEMD_SERVICE_NAME}' \
             ENV_FILE_PATH='${SERVER_ENV_FILE_PATH}' \
             bash -s" < ./scripts/deploy-frontend.sh

      - name: Health check
        env:
          HEALTHCHECK_URL: ${{ env.HEALTHCHECK_URL }}
        run: |
          curl --fail --show-error --silent "$HEALTHCHECK_URL" > /dev/null