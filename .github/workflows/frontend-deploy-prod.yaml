name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            sudo -u appuser bash -c '
              cd /home/appuser/frontend/prod

              git pull origin main

              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

              pnpm install --frozen-lockfile
              pnpm build

              pm2 reload fe-prod --update-env || pm2 start pnpm --name fe-prod -- start
              pm2 save
            '

      - name: Health check
        run: |
          sleep 15
          curl --fail --max-time 30 https://energy-iq.hng14.com || exit 1
